<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Client-side preliminary microbiology course grade calculator. No data leaves the browser." />
    <meta name="color-scheme" content="light dark" />
    <title>Course Grade Calculator</title>

    <link rel="stylesheet" href="css/themes.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />

    <script>
    // Set theme attribute synchronously to prevent flash of unstyled content.
    // The full theme module reasserts this and persists user changes.
    (function () {
        try {
            var valid = ['light-default','sepia','light-contrast','dracula','nord','dark-contrast'];
            var stored = localStorage.getItem('microGradeTheme');
            var theme = (stored && valid.indexOf(stored) !== -1) ? stored
                : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                    ? 'dracula' : 'light-default');
            document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
            document.documentElement.setAttribute('data-theme', 'dracula');
        }
    })();
    </script>
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>

<header role="banner">
    <div class="wrap header-inner">
        <div class="header-text">
            <h1 id="courseTitle">Course Grade Calculator</h1>
            <p class="sub" id="courseSubtitle"></p>
        </div>
        <div class="theme-controls" id="themeControls" role="group" aria-label="Appearance"></div>
    </div>
</header>

<main id="main" tabindex="-1">
    <div id="selectorScreen" class="wrap" aria-label="Section type selector"></div>
    <div id="separateCalc"   class="wrap hidden" aria-label="Separate lecture and lab calculator"></div>
    <div id="hybridCalc"     class="wrap hidden" aria-label="Hybrid online lecture and on-ground lab calculator"></div>
    <div id="integratedCalc" class="wrap hidden" aria-label="Integrated lecture and lab calculator"></div>
</main>

<footer class="footer" role="contentinfo">
    <p class="disclaimer" id="disclaimerText"></p>
    <p>
        <span id="footerSep" class="hidden"></span>
        <span id="footerHyb" class="hidden"></span>
        <span id="footerInt" class="hidden"></span>
    </p>
    <p>
        <a id="sourceLink" href="#" target="_blank" rel="noopener">View source on GitHub</a>
    </p>
</footer>

<script src="config.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
